backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "All Products"
        file: "src/_data/products.json"
        fields:
          - name: "items"
            label: "Products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "price", label: "Price (e.g. £2.00)", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - name: "category"
                label: "Category"
                widget: "select"
                options:
                  - { label: "Fidget Toys", value: "fidget" }
                  - { label: "Flexi Prints", value: "flexi" }
                  - { label: "Gadgets", value: "gadget" }
                  - { label: "Decor", value: "decor" }
              - { name: "image", label: "Main Image", widget: "image" }
              - name: "images"
                label: "Extra Photos"
                hint: "Add extra gallery photos. For each photo, tag which colours are shown — this powers the Colours page examples."
                widget: "list"
                required: false
                fields:
                  - { name: "image", label: "Photo", widget: "image" }
                  - name: "colours"
                    label: "Colours shown in this photo"
                    hint: "e.g. Red, Rainbow, Silk Green & Blue — must match colour names exactly"
                    widget: "list"
                    required: false
                    field: { name: "colour", label: "Colour name", widget: "string" }
              - { name: "popular", label: "Popular", widget: "boolean", default: false }
              - name: "badge"
                label: "Badge"
                widget: "select"
                required: false
                default: ""
                options:
                  - { label: "None", value: "" }
                  - { label: "Popular", value: "Popular" }
                  - { label: "Trending", value: "Trending" }
                  - { label: "Custom", value: "Custom" }
                  - { label: "Easter", value: "Easter" }
                  - { label: "New", value: "New" }
                  - { label: "Sale", value: "Sale" }

  - name: "bundles"
    label: "Bundles"
    files:
      - name: "bundles"
        label: "Pre-made Bundles"
        file: "src/_data/bundles.json"
        fields:
          - name: "items"
            label: "Bundles"
            widget: "list"
            summary: "{{fields.name}} — {{fields.price}}"
            fields:
              - { name: "name", label: "Bundle Name", widget: "string" }
              - { name: "price", label: "Bundle Price (e.g. £4.00)", widget: "string" }
              - { name: "oldPrice", label: "Original Price (e.g. £5.00)", widget: "string" }
              - { name: "description", label: "Short Description", widget: "string" }
              - name: "items"
                label: "Included Products (by name)"
                widget: "list"
                field: { name: "item", label: "Product name", widget: "string" }
              - { name: "image", label: "Bundle Image", widget: "image" }

  - name: "events"
    label: "Events & Seasonal"
    files:
      - name: "events"
        label: "Events & Seasonal"
        file: "src/_data/events.json"
        fields:
          - name: "upcoming"
            label: "Upcoming Events"
            widget: "list"
            summary: "{{fields.name}} — {{fields.date}}"
            fields:
              - { name: "name", label: "Event Name", widget: "string" }
              - { name: "date", label: "Date (YYYY-MM-DD)", widget: "string" }
              - { name: "location", label: "Location", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
          - name: "seasonal"
            label: "Seasonal Products"
            widget: "list"
            summary: "{{fields.name}} — {{fields.badge}}"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "price", label: "Price (e.g. £3.00)", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
              - { name: "image", label: "Image", widget: "image" }
              - name: "badge"
                label: "Badge"
                widget: "select"
                options:
                  - { label: "Easter", value: "Easter" }
                  - { label: "Halloween", value: "Halloween" }
                  - { label: "Christmas", value: "Christmas" }
                  - { label: "Spring", value: "Spring" }
                  - { label: "Other", value: "Other" }
              - { name: "activeFrom", label: "Active From (YYYY-MM-DD)", widget: "string" }
              - { name: "activeTo", label: "Active Until (YYYY-MM-DD)", widget: "string" }

  - name: "colours"
    label: "Colours"
    files:
      - name: "colours"
        label: "Colour Options"
        file: "src/_data/colours.json"
        fields:
          - name: "standard"
            label: "Standard Colours"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "hex", label: "Hex code (e.g. #e63946)", widget: "string" }
          - name: "special"
            label: "Special Colours"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { name: "name", label: "Name", widget: "string" }
              - { name: "hex", label: "CSS value", widget: "string" }
              - { name: "description", label: "Description", widget: "string" }
          - name: "dropdownOptions"
            label: "Basket Colour Dropdown"
            widget: "list"
            field: { name: "option", label: "Option", widget: "string" }
          - name: "lowStock"
            label: "Running Low"
            hint: "Colours that are running low on filament. These show a 'Running Low' badge on the colours page and in dropdowns."
            widget: "list"
            field: { name: "colour", label: "Colour name (must match exactly, e.g. Silk Green & Blue)", widget: "string" }

  - name: "coupons"
    label: "Coupon Codes"
    files:
      - name: "coupons"
        label: "Discount Codes"
        file: "src/_data/coupons.json"
        fields:
          - name: "items"
            label: "Codes"
            widget: "list"
            summary: "{{fields.code}} — {{fields.description}}"
            fields:
              - { name: "code", label: "Code (e.g. SAVE10)", widget: "string" }
              - { name: "description", label: "Description (shown to customer)", widget: "string" }
              - name: "type"
                label: "Discount Type"
                widget: "select"
                options:
                  - { label: "Percentage (e.g. 10%)", value: "percentage" }
                  - { label: "Fixed Amount (e.g. £1.00 off)", value: "fixed" }
              - { name: "value", label: "Value (number only — e.g. 10 for 10% or 1 for £1)", widget: "number" }
              - { name: "active", label: "Active", widget: "boolean", default: true }

  - name: "notices"
    label: "Notices"
    files:
      - name: "notices"
        label: "Site Notices"
        file: "src/_data/notices.json"
        fields:
          - name: "pauseOrders"
            label: "Pause All Orders"
            widget: "object"
            fields:
              - name: "enabled"
                label: "Pause Orders"
                widget: "boolean"
                default: false
                hint: "Toggle this on to block all ordering sitewide and show a banner. Turn off when ready to take orders again."
              - name: "message"
                label: "Banner Message"
                widget: "text"
                hint: "Shown sitewide when orders are paused."
          - name: "highVolume"
            label: "High Volume Notice"
            widget: "object"
            fields:
              - name: "enabled"
                label: "Show High Volume Banner"
                widget: "boolean"
                default: false
                hint: "Toggle this on to show a banner on the Order Help page warning customers about delays."
              - name: "message"
                label: "Banner Message"
                widget: "text"
                hint: "The message shown in the banner when enabled."

  - name: "reviews"
    label: "Reviews"
    files:
      - name: "reviews"
        label: "Customer Reviews"
        file: "src/_data/reviews.json"
        fields:
          - name: "items"
            label: "Reviews"
            widget: "list"
            summary: "{{fields.author}} — {{fields.stars}} stars"
            fields:
              - { name: "author", label: "Customer Name", widget: "string" }
              - name: "stars"
                label: "Star Rating"
                widget: "select"
                options:
                  - { label: "5 stars", value: 5 }
                  - { label: "4 stars", value: 4 }
                  - { label: "3 stars", value: 3 }
                  - { label: "2 stars", value: 2 }
                  - { label: "1 star", value: 1 }
              - { name: "text", label: "Review Text", widget: "text" }
              - { name: "date", label: "Date (e.g. March 2025)", widget: "string" }
