[build]
  command = "npx @11ty/eleventy"
  publish = "_site"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npx @11ty/eleventy --serve"
  publish = "_site"
  port = 8888
  targetPort = 8080

[[redirects]]
  from = "/business/"
  to = "/custom/"
  status = 301

[[redirects]]
  from = "/business"
  to = "/custom/"
  status = 301
